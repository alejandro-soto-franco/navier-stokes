name: Lean CI

on:
  push:
    branches: [master]
    paths:
      - 'lean/**'
      - '.github/workflows/lean.yml'
  pull_request:
    paths:
      - 'lean/**'
      - '.github/workflows/lean.yml'

jobs:
  build:
    name: lake build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- --default-toolchain none -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Set Lean toolchain
        working-directory: lean
        run: elan override set "$(cat lean-toolchain)"

      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: lean/.lake
          key: ${{ runner.os }}-lake-${{ hashFiles('lean/lean-toolchain', 'lean/lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-

      - name: Fetch Mathlib olean cache
        working-directory: lean
        run: lake exe cache get || true

      - name: Build NavierStokes
        working-directory: lean
        run: lake build NavierStokes 2>&1 | tee /tmp/lean-build.log

      - name: Check for errors
        run: |
          if grep -q "^error:" /tmp/lean-build.log; then
            echo "Lean build errors detected:"
            grep "^error:" /tmp/lean-build.log
            exit 1
          fi
          echo "Build clean."
